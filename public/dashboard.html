<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LLQA Monitor — Live</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0a0f1c;
    --panel: #111829;
    --panel-2: #161f33;
    --line: #1f2a42;
    --line-soft: #18213550;
    --text: #e8edf7;
    --muted: #828faa;
    --faint: #5a6685;
    --cyan: #4cc4e0;
    --emerald: #34d399;
    --amber: #fbbf24;
    --red: #f05252;
    --sans: "Inter", system-ui, sans-serif;
    --mono: "JetBrains Mono", ui-monospace, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  #root { height: 100vh; }

  /* ---------- Connect screen ---------- */
  .connect-wrap { height: 100vh; display: grid; place-items: center; padding: 24px; }
  .connect {
    width: 100%; max-width: 380px; background: var(--panel);
    border: 1px solid var(--line); border-radius: 14px; padding: 28px;
  }
  .connect h1 { font-size: 18px; margin: 0 0 4px; letter-spacing: -0.01em; }
  .connect p { color: var(--faint); font-size: 13px; margin: 0 0 20px; }
  .field { margin-bottom: 14px; }
  .field label {
    display: block; font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--faint); margin-bottom: 6px;
  }
  .field input {
    width: 100%; background: var(--bg); border: 1px solid var(--line); color: var(--text);
    border-radius: 8px; padding: 10px 12px; font-family: var(--mono); font-size: 13px;
  }
  .field input:focus { outline: 2px solid var(--cyan); outline-offset: 0; border-color: transparent; }
  .btn {
    width: 100%; border: none; border-radius: 8px; padding: 11px; font-weight: 600;
    font-size: 14px; cursor: pointer; font-family: var(--sans);
    background: var(--cyan); color: #042029;
  }
  .btn:hover { filter: brightness(1.08); }
  .btn:focus-visible { outline: 2px solid #fff; outline-offset: 2px; }
  .err { color: var(--red); font-size: 12.5px; margin-top: 10px; font-family: var(--mono); }

  /* ---------- App shell ---------- */
  .app { display: grid; grid-template-rows: 56px 1fr; height: 100vh; }
  .topbar {
    display: flex; align-items: center; gap: 18px; padding: 0 18px;
    background: var(--panel); border-bottom: 1px solid var(--line);
  }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand .mark {
    width: 28px; height: 28px; border-radius: 7px; display: grid; place-items: center;
    background: linear-gradient(135deg, var(--cyan), var(--emerald)); color: #04161b;
    font-weight: 700; font-family: var(--mono);
  }
  .brand .name { font-weight: 700; letter-spacing: -0.01em; font-size: 15px; }
  .brand .sub { font-family: var(--mono); font-size: 10px; color: var(--faint); letter-spacing: 0.1em; text-transform: uppercase; }

  .stats { display: flex; gap: 8px; margin-left: 8px; }
  .chip {
    display: flex; align-items: baseline; gap: 7px; padding: 6px 11px; border-radius: 8px;
    background: var(--panel-2); border: 1px solid var(--line);
  }
  .chip .n { font-family: var(--mono); font-weight: 700; font-size: 15px; }
  .chip .l { font-size: 11px; color: var(--faint); }
  .chip.online .n { color: var(--emerald); }
  .chip.idle .n { color: var(--amber); }
  .chip.offline .n { color: var(--red); }
  .chip.active .n { color: var(--cyan); }

  .top-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
  .conn { display: flex; align-items: center; gap: 7px; font-family: var(--mono); font-size: 11px; color: var(--faint); }
  .dot { width: 8px; height: 8px; border-radius: 50%; }
  .dot.ok { background: var(--emerald); box-shadow: 0 0 8px var(--emerald); }
  .dot.bad { background: var(--red); }
  .ghost-btn {
    background: var(--panel-2); border: 1px solid var(--line); color: var(--text);
    border-radius: 8px; padding: 7px 12px; font-size: 12.5px; cursor: pointer; font-family: var(--sans);
  }
  .ghost-btn:hover { border-color: var(--cyan); color: var(--cyan); }

  /* ---------- Body: rail + grid ---------- */
  .body { display: grid; grid-template-columns: 240px 1fr; min-height: 0; }
  .rail { background: var(--panel); border-right: 1px solid var(--line); padding: 16px; overflow-y: auto; }
  .rail h3 {
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--faint); margin: 4px 0 10px;
  }
  .rail .action { width: 100%; text-align: left; margin-bottom: 8px; }
  .seg { display: flex; background: var(--bg); border: 1px solid var(--line); border-radius: 8px; padding: 3px; margin-bottom: 18px; }
  .seg button {
    flex: 1; background: transparent; border: none; color: var(--faint); font-family: var(--mono);
    font-size: 11px; padding: 6px; border-radius: 6px; cursor: pointer;
  }
  .seg button.on { background: var(--panel-2); color: var(--cyan); }

  .alerts { margin-top: 8px; }
  .alert {
    background: var(--bg); border: 1px solid var(--line); border-left: 3px solid var(--amber);
    border-radius: 6px; padding: 9px 11px; margin-bottom: 8px;
  }
  .alert .who { font-size: 13px; font-weight: 600; }
  .alert .what { font-family: var(--mono); font-size: 10.5px; color: var(--amber); letter-spacing: 0.04em; text-transform: uppercase; }
  .alert .dur { font-family: var(--mono); font-size: 11px; color: var(--faint); margin-top: 2px; }
  .empty-rail { color: var(--faint); font-size: 12px; line-height: 1.5; }

  .main { padding: 16px; overflow-y: auto; min-height: 0; }
  .grid { display: grid; gap: 10px; }
  .tile {
    position: relative; aspect-ratio: 16 / 10; background: #07101e; border: 1px solid var(--line);
    border-radius: 10px; overflow: hidden; cursor: pointer; transition: border-color .15s, transform .1s;
  }
  .tile:hover { border-color: var(--cyan); }
  .tile:focus-visible { outline: 2px solid var(--cyan); outline-offset: 2px; }
  .tile img { width: 100%; height: 100%; object-fit: cover; display: block; background: #07101e; }
  .tile.idle img { filter: saturate(0.4) brightness(0.8); }
  .tile.offline { background: #0a1120; }
  .tile.offline .placeholder { color: var(--red); }
  .placeholder {
    position: absolute; inset: 0; display: grid; place-items: center; color: var(--faint);
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em;
  }
  .tile.online::after {
    content: ""; position: absolute; inset: 0; border: 1.5px solid transparent; border-radius: 10px;
    pointer-events: none;
  }
  .tile .meta {
    position: absolute; left: 0; right: 0; bottom: 0; display: flex; align-items: center; gap: 6px;
    padding: 7px 9px; background: linear-gradient(transparent, #050a14ee 65%); font-size: 12px;
  }
  .tile .meta .sdot { width: 7px; height: 7px; border-radius: 50%; flex: none; }
  .tile.online .meta .sdot { background: var(--emerald); box-shadow: 0 0 6px var(--emerald); }
  .tile.idle .meta .sdot { background: var(--amber); }
  .tile.offline .meta .sdot { background: var(--red); }
  .tile .meta .label { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tile .meta .id { font-family: var(--mono); font-size: 10px; color: var(--faint); margin-left: auto; flex: none; }
  .badge {
    position: absolute; top: 8px; right: 8px; font-family: var(--mono); font-size: 9.5px;
    letter-spacing: 0.08em; padding: 3px 6px; border-radius: 5px; font-weight: 700;
  }
  .badge.idle { background: #4a370b; color: var(--amber); }
  .badge.offline { background: #4a1414; color: var(--red); }
  .live-pip {
    position: absolute; top: 8px; left: 8px; display: flex; align-items: center; gap: 5px;
    font-family: var(--mono); font-size: 9px; color: var(--emerald); letter-spacing: 0.1em;
  }
  .live-pip .b { width: 6px; height: 6px; border-radius: 50%; background: var(--emerald); animation: pulse 1.4s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

  .empty-main { display: grid; place-items: center; height: 100%; text-align: center; color: var(--faint); }
  .empty-main h2 { color: var(--text); font-size: 16px; margin: 0 0 6px; }
  .empty-main p { font-size: 13px; max-width: 360px; line-height: 1.5; }

  /* ---------- Focus modal ---------- */
  .overlay { position: fixed; inset: 0; background: #04070ee0; display: grid; place-items: center; padding: 24px; z-index: 50; }
  .focus { width: min(1200px, 95vw); background: var(--panel); border: 1px solid var(--line); border-radius: 14px; overflow: hidden; }
  .focus-head { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-bottom: 1px solid var(--line); }
  .focus-head .label { font-weight: 600; font-size: 15px; }
  .focus-head .id { font-family: var(--mono); font-size: 11px; color: var(--faint); }
  .focus-head .x { margin-left: auto; }
  .focus-body { background: #04070e; aspect-ratio: 16 / 9; display: grid; place-items: center; }
  .focus-body img { width: 100%; height: 100%; object-fit: contain; }
  .focus-body .placeholder { position: static; }

  /* ---------- Small modal (install) ---------- */
  .modal { width: min(520px, 92vw); background: var(--panel); border: 1px solid var(--line); border-radius: 14px; padding: 24px; }
  .modal h2 { margin: 0 0 4px; font-size: 16px; }
  .modal p { color: var(--faint); font-size: 13px; line-height: 1.55; margin: 0 0 12px; }
  .modal code { background: var(--bg); border: 1px solid var(--line); border-radius: 6px; padding: 2px 6px; font-family: var(--mono); font-size: 12px; color: var(--cyan); }
  .modal ol { margin: 0 0 14px; padding-left: 18px; font-size: 13px; line-height: 1.7; }

  @media (prefers-reduced-motion: reduce) { .live-pip .b { animation: none; } }
  @media (max-width: 720px) {
    .body { grid-template-columns: 1fr; }
    .rail { display: none; }
    .stats { display: none; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useCallback } = React;

// Grid frames: small + slow (cheap). Focus frame: bigger + faster.
const GRID = { fps: 0.5, quality: 12, width: 400 };
const FOCUS = { fps: 2, quality: 6, width: 1100 };

function api(base, token, pathStr, opts = {}) {
  return fetch(base + pathStr, {
    ...opts,
    headers: { authorization: "Bearer " + token, ...(opts.headers || {}) },
  });
}

function statusOf(m) {
  if (!m.online) return "offline";
  if (m.activity === "idle") return "idle";
  return "online";
}

function fmtDur(ms) {
  if (!ms || ms < 0) return "";
  const s = Math.floor(ms / 1000);
  const mm = Math.floor(s / 60);
  const ss = s % 60;
  return mm + "m " + String(ss).padStart(2, "0") + "s";
}

function Connect({ onConnect }) {
  const [server, setServer] = useState(window.location.origin);
  const [token, setToken] = useState("");
  const [err, setErr] = useState("");
  const [busy, setBusy] = useState(false);

  const go = async () => {
    setErr(""); setBusy(true);
    try {
      const base = server.replace(/\/$/, "");
      const res = await api(base, token, "/api/admin/machines");
      if (res.status === 401) { setErr("Wrong admin token."); setBusy(false); return; }
      if (!res.ok) { setErr("Server error: " + res.status); setBusy(false); return; }
      onConnect(base, token);
    } catch (e) {
      setErr("Can't reach the server. Check the address and that it's running.");
      setBusy(false);
    }
  };

  return (
    <div className="connect-wrap">
      <div className="connect">
        <h1>LLQA Monitor</h1>
        <p>Live view of academy-owned teaching computers.</p>
        <div className="field">
          <label>Server address</label>
          <input value={server} onChange={(e) => setServer(e.target.value)} spellCheck="false" />
        </div>
        <div className="field">
          <label>Admin token</label>
          <input type="password" value={token} placeholder="your dashboard password"
            onChange={(e) => setToken(e.target.value)}
            onKeyDown={(e) => e.key === "Enter" && go()} />
        </div>
        <button className="btn" onClick={go} disabled={busy}>{busy ? "Connecting…" : "Connect"}</button>
        {err && <div className="err">{err}</div>}
      </div>
    </div>
  );
}

function InstallModal({ base, onClose }) {
  return (
    <div className="overlay" onClick={onClose}>
      <div className="modal" onClick={(e) => e.stopPropagation()}>
        <h2>Add a computer</h2>
        <p>The agent is installed software — it can't be a web page. On the teaching PC (needs Node 18+ and ffmpeg):</p>
        <ol>
          <li>Copy the <code>agent</code> folder to the PC.</li>
          <li>In <code>config.json</code> set <code>serverUrl</code> to <code>{base}</code> and <code>tenantKey</code> to your enrollment key.</li>
          <li>Run <code>npm start</code> in the agent folder.</li>
        </ol>
        <p>The PC appears here within a few seconds. The one-click installer that auto-starts the agent as a locked service comes in the installer step.</p>
        <button className="btn" onClick={onClose}>Got it</button>
      </div>
    </div>
  );
}

function Focus({ base, token, machine, tick, onClose }) {
  const st = statusOf(machine);
  const src = base + "/api/admin/machines/" + encodeURIComponent(machine.machineId) + "/frame?token=" + encodeURIComponent(token) + "&t=" + tick;
  return (
    <div className="overlay" onClick={onClose}>
      <div className="focus" onClick={(e) => e.stopPropagation()}>
        <div className="focus-head">
          <span className="dot ok" style={{ background: st === "offline" ? "var(--red)" : st === "idle" ? "var(--amber)" : "var(--emerald)" }}></span>
          <span className="label">{machine.hostname}</span>
          <span className="id">{machine.machineId}</span>
          <button className="ghost-btn x" onClick={onClose}>Close</button>
        </div>
        <div className="focus-body">
          {st === "offline"
            ? <div className="placeholder">OFFLINE</div>
            : <img alt="live" src={src} onError={(e) => { e.target.style.visibility = "hidden"; }}
                   onLoad={(e) => { e.target.style.visibility = "visible"; }} />}
        </div>
      </div>
    </div>
  );
}

function Tile({ base, token, m, tick, onOpen }) {
  const st = statusOf(m);
  const src = base + "/api/admin/machines/" + encodeURIComponent(m.machineId) + "/frame?token=" + encodeURIComponent(token) + "&t=" + tick;
  return (
    <div className={"tile " + st} tabIndex="0" role="button"
      onClick={() => onOpen(m)} onKeyDown={(e) => e.key === "Enter" && onOpen(m)}>
      {st === "offline"
        ? <div className="placeholder">OFFLINE</div>
        : <img alt="" src={src}
            onError={(e) => { e.target.style.opacity = 0; }}
            onLoad={(e) => { e.target.style.opacity = 1; }} />}
      {st === "online" && <div className="live-pip"><span className="b"></span>LIVE</div>}
      {st === "idle" && <div className="badge idle">IDLE</div>}
      {st === "offline" && <div className="badge offline">OFFLINE</div>}
      <div className="meta">
        <span className="sdot"></span>
        <span className="label">{m.hostname}</span>
        <span className="id">{m.machineId.split("-")[0]}</span>
      </div>
    </div>
  );
}

function App() {
  const [conn, setConn] = useState(null); // { base, token }
  const [machines, setMachines] = useState([]);
  const [reachable, setReachable] = useState(true);
  const [density, setDensity] = useState("4x4");
  const [focusId, setFocusId] = useState(null);
  const [showInstall, setShowInstall] = useState(false);
  const [gridTick, setGridTick] = useState(0);
  const [focusTick, setFocusTick] = useState(0);
  const focusIdRef = useRef(null);
  focusIdRef.current = focusId;

  // Poll machine list.
  useEffect(() => {
    if (!conn) return;
    let alive = true;
    const pull = async () => {
      try {
        const res = await api(conn.base, conn.token, "/api/admin/machines");
        if (!alive) return;
        if (res.ok) { const d = await res.json(); setMachines(d.machines || []); setReachable(true); }
        else setReachable(false);
      } catch { if (alive) setReachable(false); }
    };
    pull();
    const t = setInterval(pull, 5000);
    return () => { alive = false; clearInterval(t); };
  }, [conn]);

  // Keep the right tiles "live" (server marks them; agents send frames).
  useEffect(() => {
    if (!conn) return;
    let alive = true;
    const keep = async () => {
      const fid = focusIdRef.current;
      try {
        if (fid) {
          await api(conn.base, conn.token, "/api/admin/live", {
            method: "POST", headers: { "content-type": "application/json" },
            body: JSON.stringify({ machineIds: [fid], ...FOCUS }),
          });
        } else {
          const ids = machines.filter((m) => m.online).map((m) => m.machineId);
          if (ids.length) {
            await api(conn.base, conn.token, "/api/admin/live", {
              method: "POST", headers: { "content-type": "application/json" },
              body: JSON.stringify({ machineIds: ids, ...GRID }),
            });
          }
        }
      } catch { /* transient */ }
    };
    keep();
    const t = setInterval(keep, 7000);
    return () => { alive = false; clearInterval(t); };
  }, [conn, machines, focusId]);

  // Frame refresh ticks.
  useEffect(() => {
    const g = setInterval(() => setGridTick((t) => t + 1), 2500);
    const f = setInterval(() => setFocusTick((t) => t + 1), 700);
    return () => { clearInterval(g); clearInterval(f); };
  }, []);

  if (!conn) return <Connect onConnect={(base, token) => setConn({ base, token })} />;

  const counts = machines.reduce(
    (a, m) => {
      const s = statusOf(m);
      a[s]++;
      if (s === "online") a.activeTotal++;
      return a;
    },
    { online: 0, idle: 0, offline: 0, activeTotal: 0 }
  );

  const idleList = machines
    .filter((m) => m.online && m.activity === "idle")
    .map((m) => ({ m, since: m.activityMeta && m.activityMeta.idleSec ? m.activityMeta.idleSec * 1000 : null }));

  const cols = density === "1x1" ? 1 : density === "4x4" ? 4 : 8;
  const focusMachine = machines.find((m) => m.machineId === focusId) || null;

  return (
    <div className="app">
      <div className="topbar">
        <div className="brand">
          <div className="mark">Q</div>
          <div>
            <div className="name">LLQA Monitor</div>
            <div className="sub">Live · Quality Control</div>
          </div>
        </div>
        <div className="stats">
          <div className="chip online"><span className="n">{counts.online}</span><span className="l">Active</span></div>
          <div className="chip idle"><span className="n">{counts.idle}</span><span className="l">Idle</span></div>
          <div className="chip offline"><span className="n">{counts.offline}</span><span className="l">Offline</span></div>
          <div className="chip"><span className="n">{machines.length}</span><span className="l">Total</span></div>
        </div>
        <div className="top-right">
          <div className="conn">
            <span className={"dot " + (reachable ? "ok" : "bad")}></span>
            {reachable ? "Connected" : "Reconnecting…"}
          </div>
          <button className="ghost-btn" onClick={() => setConn(null)}>Sign out</button>
        </div>
      </div>

      <div className="body">
        <div className="rail">
          <h3>Controls</h3>
          <button className="ghost-btn action" onClick={() => setShowInstall(true)}>+ Add a computer</button>

          <h3 style={{ marginTop: 18 }}>Layout</h3>
          <div className="seg">
            {["1x1", "4x4", "8x8"].map((d) => (
              <button key={d} className={density === d ? "on" : ""} onClick={() => setDensity(d)}>{d}</button>
            ))}
          </div>

          <h3>Needs attention</h3>
          <div className="alerts">
            {idleList.length === 0 && <div className="empty-rail">No idle teachers right now.</div>}
            {idleList.map(({ m, since }) => (
              <div className="alert" key={m.machineId} onClick={() => setFocusId(m.machineId)} style={{ cursor: "pointer" }}>
                <div className="who">{m.hostname}</div>
                <div className="what">Keyboard / mouse idle</div>
                {since != null && <div className="dur">{fmtDur(since)}</div>}
              </div>
            ))}
          </div>
        </div>

        <div className="main">
          {machines.length === 0 ? (
            <div className="empty-main">
              <div>
                <h2>No computers yet</h2>
                <p>Install the agent on a teaching PC to see its screen here. Use “Add a computer” on the left for the steps.</p>
              </div>
            </div>
          ) : (
            <div className="grid" style={{ gridTemplateColumns: "repeat(" + cols + ", 1fr)" }}>
              {machines.map((m) => (
                <Tile key={m.machineId} base={conn.base} token={conn.token} m={m} tick={gridTick} onOpen={(mm) => setFocusId(mm.machineId)} />
              ))}
            </div>
          )}
        </div>
      </div>

      {focusMachine && (
        <Focus base={conn.base} token={conn.token} machine={focusMachine} tick={focusTick} onClose={() => setFocusId(null)} />
      )}
      {showInstall && <InstallModal base={conn.base} onClose={() => setShowInstall(false)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
